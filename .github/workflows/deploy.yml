name: Build Games

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm --filter @playground/sdk build

      - name: Build all games
        run: pnpm -r --filter './games/*' build

      - name: Verify builds
        run: |
          count=0
          for game in games/*/; do
            if [ -f "$game/dist/index.html" ]; then
              count=$((count+1))
            else
              echo "❌ $(basename $game) missing dist"
              exit 1
            fi
          done
          echo "✅ $count games built successfully"
